<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title id="page-title">StageDoor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo-link">
                <!-- Light mode logo -->
                <img src="images/StageDoorLogo.png" alt="StageDoor" class="logo-light">
                <!-- Dark mode logo -->
                <img src="images/StageDoorLogoDarkMode.png" alt="StageDoor" class="logo-dark">
            </a>

            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#about" class="nav-link">About StageDoor</a>
                <a href="index.html#archive" class="nav-link">Archive</a>
            </nav>

            <div class="theme-toggle">
                <span class="toggle-label">Light</span>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label">Dark</span>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 40px;">
        <a href="index.html#archive" class="back-btn">← Back to Archive</a>

        <h2 id="d-title"></h2>
        <p class="tagline" id="d-tagline"></p>

        <div class="two-col">
            <div>
                <h3>Overview</h3>
                <p id="d-overview"></p>
                <h3>Tags</h3>
                <ul id="d-tags"></ul>
            </div>
            <div>
                <h3>Cast</h3>
                <ul id="d-cast"></ul>
            </div>
        </div>

        <!-- TIMELINE ONLY FOR HADESTOWN -->
        <div id="visual-timeline" class="visual-timeline-section"></div>

        <!-- ALSO SECTION -->
        <h3 style="margin-top:80px;">Also</h3>
        <div id="also" class="also"></div>
    </main>

    <footer class="footer">
        <small>StageDoor prototype — Angie</small>
    </footer>

    <script src="app.js"></script>
    <script>
        async function loadDetail() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return window.location.href = 'index.html';

            const res = await fetch('data.json');
            const shows = await res.json();
            const show = shows.find(s => s.id === id);
            if (!show) return window.location.href = 'index.html';

            document.getElementById('page-title').textContent = `StageDoor — ${show.title}`;
            document.getElementById('d-title').textContent = show.title;
            document.getElementById('d-tagline').textContent = show.tagline || '';
            document.getElementById('d-overview').textContent = show.overview;

            document.getElementById('d-tags').innerHTML = show.tags.map(t => `<li>${t}</li>`).join('');
            document.getElementById('d-cast').innerHTML = show.cast.map(c => `<li>${c.role} — ${c.actor}</li>`).join('');

            const timelineDiv = document.getElementById('visual-timeline');
            timelineDiv.innerHTML = '';
            if (id === "hadestown") {
                timelineDiv.innerHTML = `
                    <h3 style="text-align:center; margin:60px 0 30px;">Full Song Timeline</h3>
                    
                    <details class="act-details">
                        <summary class="act-title">Act I</summary>
                        <div id="act1-timeline" class="timeline"></div>
                    </details>
                    
                    <details class="act-details">
                        <summary class="act-title">Act II</summary>
                        <div id="act2-timeline" class="timeline"></div>
                    </details>
                `;
                renderHadestownTimeline();
            }

            const alsoDiv = document.getElementById('also');
            alsoDiv.innerHTML = '';
            if (show.also && show.also.length > 0) {
                show.also.forEach(aId => {
                    const related = shows.find(s => s.id === aId);
                    if (!related) return;
                    const card = document.createElement('div');
                    card.className = 'alsoCard';
                    card.innerHTML = `<img src="${related.poster}" alt="${related.title}"><p>${related.title}</p>`;
                    card.onclick = () => window.location.href = `detail.html?id=${related.id}`;
                    alsoDiv.appendChild(card);
                });
            }
        }

        function renderHadestownTimeline() {
            const act1 = [ /* your list */ 
                {num:1, title:"Road to Hell", chars:"Hermes, Company"},
                {num:2, title:"Any Way the Wind Blows", chars:"Eurydice, The Fates"},
                {num:3, title:"Come Home With Me", chars:"Orpheus, Eurydice, Hermes, Workers"},
                {num:4, title:"Wedding Song", chars:"Orpheus, Eurydice, Workers"},
                {num:5, title:"Epic I", chars:"Orpheus, Hermes"},
                {num:6, title:"Livin' it Up on Top", chars:"Persephone, Hermes, Orpheus, Company"},
                {num:7, title:"All I've Ever Known", chars:"Eurydice, Orpheus"},
                {num:8, title:"Way Down Hadestown", chars:"Company"},
                {num:9, title:"A Gathering Storm", chars:"Hermes, Orpheus, Eurydice, The Fates"},
                {num:10, title:"Epic II", chars:"Orpheus"},
                {num:11, title:"Chant", chars:"Company"},
                {num:12, title:"Hey, Little Songbird", chars:"Hades, Eurydice"},
                {num:13, title:"When the Chips Are Down", chars:"The Fates, Eurydice"},
                {num:14, title:"Gone, I'm Gone", chars:"Eurydice, The Fates"},
                {num:15, title:"Wait for Me", chars:"Hermes, Orpheus, The Fates, Workers"},
                {num:16, title:"Why We Build the Wall", chars:"Hades, Company"}
            ];

            const act2 = [ /* your list */ 
                {num:1, title:"Our Lady of the Underground", chars:"Persephone"},
                {num:2, title:"Way Down Hadestown (reprise)", chars:"Hermes, The Fates, Eurydice, Workers"},
                {num:3, title:"Flowers", chars:"Eurydice"},
                {num:4, title:"Come Home With Me (reprise)", chars:"Orpheus, Eurydice"},
                {num:5, title:"Papers", chars:"Hades, Company"},
                {num:6, title:"Nothing Changes", chars:"The Fates"},
                {num:7, title:"If It's True", chars:"Orpheus, Hermes, Workers"},
                {num:8, title:"How Long?", chars:"Persephone, Hades"},
                {num:9, title:"Chant (reprise)", chars:"Company"},
                {num:10, title:"Epic III", chars:"Orpheus, Company"},
                {num:11, title:"Promises", chars:"Eurydice, Orpheus"},
                {num:12, title:"Word to the Wise", chars:"The Fates"},
                {num:13, title:"His Kiss, the Riot", chars:"Hades"},
                {num:14, title:"Wait for Me (reprise)", chars:"Hermes, Company"},
                {num:15, title:"Doubt Comes In", chars:"Orpheus, Eurydice, The Fates, Workers"},
                {num:16, title:"Road to Hell (reprise)", chars:"Hermes, Company"},
                {num:17, title:"We Raise our Cups", chars:"Persephone, Eurydice, Company"}
            ];

            document.getElementById('act1-timeline').innerHTML = act1.map((song, i) => `
                <div class="timeline-item ${i % 2 === 0 ? 'left' : 'right'}">
                    <div class="timeline-image">pic ${song.num}</div>
                    <div class="timeline-content">
                        <h4>${song.title}</h4>
                        <p class="characters">${song.chars}</p>
                        <p class="desc-placeholder">Desc coming soon</p>
                    </div>
                </div>
            `).join('');

            document.getElementById('act2-timeline').innerHTML = act2.map((song, i) => `
                <div class="timeline-item ${i % 2 === 0 ? 'left' : 'right'}">
                    <div class="timeline-image">pic ${song.num}</div>
                    <div class="timeline-content">
                        <h4>${song.title}</h4>
                        <p class="characters">${song.chars}</p>
                        <p class="desc-placeholder">Desc coming soon</p>
                    </div>
                </div>
            `).join('');
        }

        loadDetail();
    </script>
</body>
</html>
