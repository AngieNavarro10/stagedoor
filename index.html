<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>StageDoor</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<h1>StageDoor</h1>

<p class="sub">Discover musicals by genre, music style, and structure</p>

</header>


<main class="container">

<section class="controls">

<input id="search" type="search" placeholder="Search musicals..." />

<select id="genre">
<option value="">All genres</option>
</select>

<select id="musicGenre">
<option value="">All music genres</option>
</select>

<select id="format">
<option value="">All formats</option>
</select>

<select id="tag">
<option value="">All tags</option>
</select>

</section>


<section class="grid" id="grid"></section>


<section class="detail hidden" id="detail">

<button id="back">← Back</button>

<h2 id="d-title"></h2>

<p class="tagline" id="d-tagline"></p>

<div class="two-col">

<div>

<h3>Overview</h3>

<p id="d-overview"></p>

<h3>Tags</h3>

<ul id="d-tags"></ul>

</div>

<div>

<h3>Cast</h3>

<ul id="d-cast"></ul>

<h3>Song timeline</h3>

<ol id="d-songs"></ol>

</div>

</div>

</section>

</main>


<footer class="footer">

<small>StageDoor prototype — Angie</small>

</footer>

<script src="app.js"></script>

</body>

</html>
